<div class="container-fluid mt-2">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h3 class="text-dark m-0"><i class="bi bi-pie-chart"></i> Data Analytics</h3>
  </div>

  <div class="row g-4">
    <div class="col-md-5">
      <div class="card shadow-sm border-0 h-100">
        <div class="card-header bg-white border-0 pt-4 pb-0">
          <h5 class="fw-bold">Status Overview</h5>
        </div>
        <div class="card-body d-flex justify-content-center align-items-center">
          <div style="width: 80%;">
             <canvas baseChart 
                [data]="pieChartData" 
                [type]="pieChartType" 
                [options]="pieChartOptions">
             </canvas>
          </div>
        </div>
      </div>
    </div>

    <div class="col-md-7">
      <div class="card shadow-sm border-0 h-100">
        <div class="card-header bg-white border-0 pt-4 pb-0">
          <h5 class="fw-bold">Plans Distribution</h5>
        </div>
        <div class="card-body d-flex justify-content-center align-items-center">
          <div style="width: 90%;">
             <canvas baseChart 
                [data]="barChartData" 
                [type]="barChartType" 
                [options]="barChartOptions">
             </canvas>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
