<div class="container-fluid mt-2">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h3 class="text-dark m-0"><i class="bi bi-clock-history"></i> System Audit Logs</h3>
  </div>

  <div class="card shadow-sm border-0">
    <div class="card-body p-0">
      <table class="table table-hover align-middle m-0">
        <thead class="table-light">
          <tr>
            <th>Timestamp</th>
            <th>Action</th>
            <th>Description</th>
            <th>User</th>
          </tr>
        </thead>
       <tbody>
          @if (isLoading) {
            <tr>
              <td colspan="4" class="text-center py-5">
                <div class="spinner-border text-primary" role="status">
                  <span class="visually-hidden">Loading...</span>
                </div>
                <p class="text-muted mt-2">Fetching system logs...</p>
              </td>
            </tr>
          } 
          @else {
            @for (log of logs; track log.logId) {
              <tr>
                <td class="text-muted small">{{ log.timestamp | date:'medium' }}</td>
                <td>
                  <span class="badge" 
                        [ngClass]="{
                          'bg-success': log.action === 'CREATE',
                          'bg-warning text-dark': log.action === 'UPDATE',
                          'bg-danger': log.action === 'DELETE',
                          'bg-info text-dark': log.action === 'EXPORT'
                        }">
                    {{ log.action }}
                  </span>
                </td>
                <td class="fw-bold text-dark">{{ log.description }}</td>
                <td><i class="bi bi-person-circle me-1"></i> {{ log.username }}</td>
              </tr>
            }
          }
        </tbody>
      </table>
    </div>
  </div>
</div>
